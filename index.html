<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sujith K | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #e2e8f0;
  --accent: linear-gradient(135deg, #6366f1, #22c55e);
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  scroll-behavior: smooth;
}

/* NAV */
nav {
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.gradient {
  background: var(--accent);
  -webkit-background-clip: text;
  color: transparent;
}

.typing {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin: 10px;
  padding: 10px 18px;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  text-decoration: none;
}

/* SECTION */
section {
  max-width: 1000px;
  margin: auto;
  padding: 60px 20px;
}

/* CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
}

/* PROJECT HOVER */
.project:hover {
  transform: scale(1.03);
}

/* FORM */
input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  outline: none;
}
</style>
</head>

<body>

<nav>
  <h3 class="gradient">Sujith</h3>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Hi, I'm <span class="gradient">Sujith</span></h1>
  <h2 class="typing" id="typing"></h2>

  <a href="#projects" class="btn">View Projects</a>
  <a href="#contact" class="btn">Get In Touch</a>
</div>

<!-- ABOUT -->
<section>
<div class="card">
<h2>👤 About Me</h2>
<p>Passionate developer focused on AI and web technologies.</p>
</div>
</section>

<!-- PROJECTS -->
<section id="projects">
<div class="card project">
<h3>Hospital Management System</h3>
<p>Manages hospital data efficiently.</p>
</div>

<div class="card project">
<h3>AI Navigation Assistant</h3>
<p>AI-based navigation system.</p>
</div>
</section>

<!-- CONTACT -->
<section id="contact">

<div class="card">
<h2>📩 Contact Me</h2>

<form>
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea rows="4" placeholder="Message"></textarea>
<button class="btn">Send</button>
</form>

</div>

<div class="card">
<a href="mailto:gokulsujith72@gmail.com" class="btn">Email Me</a>
<a href="https://www.linkedin.com/in/sujith-k-b1a16a328/" target="_blank" class="btn">LinkedIn</a>
</div>

</section>

<script>
// typing effect
const text = ["AI Developer", "Web Developer", "UI/UX Enthusiast"];
let i=0, j=0, current="", isDeleting=false;

function type() {
  current = text[i];
  
  if(!isDeleting){
    document.getElementById("typing").textContent = current.substring(0, j++);
    if(j > current.length){ isDeleting = true; setTimeout(type, 1000); return; }
  } else {
    document.getElementById("typing").textContent = current.substring(0, j--);
    if(j == 0){ isDeleting = false; i = (i+1)%text.length; }
  }
  
  setTimeout(type, isDeleting ? 50 : 100);
}
type();
</script>

</body>
</html>
